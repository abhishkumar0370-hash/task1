<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // marks grade 
let marks=Number(prompt("Enter your marks:"));
if (marks >= 80 && marks<=100){
    alert("Grade: A");
}
else if (marks >= 60 && marks < 80){
    alert("Grade: B");
}
else if (marks >= 40 && marks < 60){
    alert("Grade: C");
}
else{
    alert("Fail");
}
    </script>
</body>
</html>
